# Dependabot configuration.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Goal: keep dependency-update noise to a single daily PR by grouping *all* npm
# updates (version and security) together instead of one PR per package.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Kolkata"
    # A group counts as one PR; this cap is a safety valve, not a per-package limit.
    open-pull-requests-limit: 5
    groups:
      # All routine version bumps (major/minor/patch, prod + dev) in one PR.
      npm-all:
        applies-to: version-updates
        patterns:
          - "*"
      # All security fixes batched into one PR as well.
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
